steps:
  - name: 'golang:1.25'
    entrypoint: 'sh'
    args:
      - '-c'
      - 'cd cmd && go mod download && go build -o savia-be .'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/savia-backend:latest', '.']
images:
  - 'gcr.io/$PROJECT_ID/savia-backend:latest'